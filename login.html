<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — لعبة البلف</title>
  <meta name="description" content="تسجيل الدخول إلى لوحة تحكم لعبة البلف." />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>

<body>

  <div class="login-screen">
    <form id="login-form" class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">🎲</div>
        <h1>لعبة البلف</h1>
      </div>
      <p class="login-subtitle">لوحة التحكم · سجّل دخولك للمتابعة</p>
      <label>
        البريد الإلكتروني
        <input type="email" id="login-email" required autocomplete="username" placeholder="you@example.com" />
      </label>
      <label>
        كلمة المرور
        <input type="password" id="login-password" required autocomplete="current-password" placeholder="••••••••" />
      </label>
      <button type="submit" id="login-button">تسجيل الدخول</button>
      <div id="login-error" class="error-banner" hidden>
        <span>⚠</span>
        <span id="login-error-text"></span>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
