<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة البلف — لوحة التحكم</title>
  <meta name="description"
    content="لوحة تحكم المشرف للعبة البلف — إدارة الفئات والأسئلة والغرف والمستخدمين ومتابعة النشاط الحي ومقاييس النمو والتفاعل." />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>

<body>

  <div id="app-shell" class="app-shell" hidden>

    <!-- الشريط الجانبي -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🎲</div>
        <div class="sidebar-logo-text">
          <span class="sidebar-logo-name">لعبة البلف</span>
          <span class="sidebar-logo-sub">لوحة التحكم</span>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <span class="nav-section-label">التحليلات</span>

        <button class="nav-item" data-route="overview" id="nav-overview">
          <span class="nav-item-icon">📊</span>
          <span class="nav-item-label">نظرة عامة</span>
        </button>

        <button class="nav-item" data-route="leaderboard" id="nav-leaderboard">
          <span class="nav-item-icon">🏆</span>
          <span class="nav-item-label">المتصدرون</span>
        </button>

        <span class="nav-section-label">المحتوى</span>

        <button class="nav-item" data-route="categories" id="nav-categories">
          <span class="nav-item-icon">🗂️</span>
          <span class="nav-item-label">الفئات</span>
        </button>

        <button class="nav-item" data-route="questions" id="nav-questions">
          <span class="nav-item-icon">❓</span>
          <span class="nav-item-label">الأسئلة</span>
        </button>

        <span class="nav-section-label">اللاعبون</span>

        <button class="nav-item" data-route="rooms" id="nav-rooms">
          <span class="nav-item-icon">🚪</span>
          <span class="nav-item-label">الغرف</span>
        </button>

        <button class="nav-item" data-route="users" id="nav-users">
          <span class="nav-item-icon">👤</span>
          <span class="nav-item-label">المستخدمون</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item" id="logout-button">
          <span class="nav-item-icon">🚪</span>
          <span class="nav-item-label">تسجيل الخروج</span>
        </button>
      </div>
    </aside>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">

      <!-- الشريط العلوي -->
      <header class="topbar">
        <div class="topbar-left">
          <span id="topbar-title" class="topbar-title">نظرة عامة</span>
          <span id="topbar-live" class="live-dot" hidden title="بيانات مباشرة"></span>
        </div>
        <div class="topbar-right">
          <button id="refresh-button" class="btn-secondary">↻ تحديث</button>
        </div>
      </header>

      <!-- كل عرض يُبنى بالكامل من وحدة JS الخاصة به (js/views/*.js) -->
      <section id="view-overview" class="view-panel"></section>
      <section id="view-leaderboard" class="view-panel"></section>
      <section id="view-categories" class="view-panel"></section>
      <section id="view-questions" class="view-panel"></section>
      <section id="view-rooms" class="view-panel"></section>
      <section id="view-users" class="view-panel"></section>

    </div><!-- /.main-content -->
  </div><!-- /#app-shell -->

  <!-- ─── نافذة الفئة ───────────────────────────────────────────────────── -->
  <dialog id="category-dialog" class="dialog">
    <div class="dialog-header">
      <h3 id="category-dialog-title">إضافة فئة</h3>
      <button class="dialog-close" data-close="category-dialog" title="إغلاق">✕</button>
    </div>
    <form id="category-form">
      <label>
        المعرّف <span class="hint">(قصير، أحرف صغيرة، بدون مسافات — لا يمكن تغييره لاحقاً)</span>
        <input type="text" id="category-id" required />
      </label>
      <label>
        الاسم <span class="hint">(يظهر في التطبيق)</span>
        <input type="text" id="category-name" required />
      </label>
      <label>
        الفئة الأم <span class="hint">(اختياري — اتركه فارغاً للفئة الرئيسية)</span>
        <select id="category-parent">
          <option value="">لا شيء (فئة رئيسية)</option>
        </select>
      </label>
      <div id="category-error" class="inline-error" hidden>
        <span>⚠</span><span id="category-error-text"></span>
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn-ghost" data-close="category-dialog">إلغاء</button>
        <button type="submit" class="btn-primary">حفظ</button>
      </div>
    </form>
  </dialog>

  <!-- ─── نافذة السؤال ──────────────────────────────────────────────────── -->
  <dialog id="question-dialog" class="dialog">
    <div class="dialog-header">
      <h3 id="question-dialog-title">إضافة سؤال</h3>
      <button class="dialog-close" data-close="question-dialog" title="إغلاق">✕</button>
    </div>
    <form id="question-form">
      <input type="hidden" id="question-original-id" />
      <label>
        الفئة
        <select id="question-category" required></select>
      </label>
      <label>
        نص السؤال
        <textarea id="question-text" required rows="3"></textarea>
      </label>
      <label>
        الإجابة الصحيحة
        <input type="text" id="question-answer" required />
      </label>
      <div id="question-error" class="inline-error" hidden>
        <span>⚠</span><span id="question-error-text"></span>
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn-ghost" data-close="question-dialog">إلغاء</button>
        <button type="submit" class="btn-primary">حفظ</button>
      </div>
    </form>
  </dialog>

  <!-- ─── نافذة التأكيد ─────────────────────────────────────────────────── -->
  <dialog id="confirm-dialog" class="dialog">
    <div class="dialog-header">
      <h3 id="confirm-dialog-title">تأكيد</h3>
      <button class="dialog-close" id="confirm-close-btn" title="إغلاق">✕</button>
    </div>
    <div class="confirm-body">
      <p class="confirm-message" id="confirm-dialog-message"></p>
      <div class="dialog-actions">
        <button type="button" class="btn-ghost" id="confirm-cancel-btn">إلغاء</button>
        <button type="button" class="btn-primary" id="confirm-ok-btn"
          style="background:var(--danger);box-shadow:none;">حذف</button>
      </div>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/state.js"></script>
  <script src="js/events.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/router.js"></script>

  <script src="js/components/list-view.js"></script>
  <script src="js/components/confirm-dialog.js"></script>
  <script src="js/components/category-dialog.js"></script>
  <script src="js/components/question-dialog.js"></script>

  <script src="js/views/overview.js"></script>
  <script src="js/views/leaderboard.js"></script>
  <script src="js/views/categories.js"></script>
  <script src="js/views/questions.js"></script>
  <script src="js/views/rooms.js"></script>
  <script src="js/views/users.js"></script>

  <script src="js/main.js"></script>
</body>

</html>
